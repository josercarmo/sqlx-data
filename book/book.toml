[book]
title = "SQLx-Data: The Complete Guide"
authors = ["Jose Carmo"]
description = "A comprehensive guide to building type-safe, zero-boilerplate SQL repositories with SQLx-Data"
src = "src"
language = "en"

[output.html]
default-theme = "navy"
preferred-dark-theme = "navy"
no-section-label = false
git-repository-url = "https://github.com/jose.rcarmo/sqlx-data"
edit-url-template = "https://github.com/jose.rcarmo/sqlx-data/edit/main/book/{path}"

[output.html.playground]
editable = true
copy-js = true
line-numbers = false
runnable = true

[output.html.search]
enable = true
limit-results = 30
teaser-word-count = 30
use-boolean-and = true
boost-title = 2
boost-hierarchy = 1
boost-paragraph = 1
expand = true
heading-split-level = 3

[output.html.print]
enable = true
page-break = false


[preprocessor.links]